<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Manutenção Programada</title>

<style>

body{

background:#f4f4f4;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}

.card{

width:700px;

background:white;

padding:40px;

border-radius:10px;

box-shadow:0px 5px 20px rgba(0,0,0,.2);

text-align:center;

}

h1{

color:#d35400;

}

p{

font-size:18px;

}

.data{

font-size:22px;

font-weight:bold;

color:#0b5ed7;

}

</style>

</head>

<body>

<div class="card">

<h1>⚠ Aplicativo em manutenção</h1>

<p>

Estamos realizando uma atualização programada.

</p>

<p>

Durante esse período os apontamentos estarão indisponíveis.

</p>

<p class="data">

Retorno previsto

<br><br>

01/08/2026 às 15:30

</p>

<hr>

<p>

Em caso de dúvidas, entre em contato com a equipe de TI.

</p>

</div>

</body>

</html>
